<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Suplementy">
  <title>Suplementy</title>
  <style>
    :root {
      --bg: #F2F2F7;
      --card: #FFFFFF;
      --primary: #007AFF;
      --green: #34C759;
      --orange: #FF9500;
      --red: #FF3B30;
      --label: #8E8E93;
      --border: #C6C6C8;
      --text: #000;
      --text2: #3C3C43;
      --safe-top: env(safe-area-inset-top, 44px);
      --safe-bot: env(safe-area-inset-bottom, 34px);
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg:#000; --card:#1C1C1E; --text:#fff; --text2:#EBEBF5; --label:#636366; --border:#38383A; }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      background: var(--bg); color: var(--text);
      padding-top: var(--safe-top); padding-bottom: var(--safe-bot);
    }

    /* NAV */
    .navbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px 8px; background: var(--bg);
      position: sticky; top: 0; z-index: 10;
    }
    .navbar h1 { font-size: 28px; font-weight: 700; }
    .nav-tabs { display: flex; gap: 0; background: var(--border); border-radius: 9px; padding: 2px; }
    .nav-tab {
      padding: 5px 14px; border-radius: 7px; border: none;
      font-size: 13px; font-weight: 600; cursor: pointer;
      background: transparent; color: var(--label); transition: all 0.15s;
    }
    .nav-tab.active { background: var(--card); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.15); }
    .nav-btn { background: none; border: none; color: var(--primary); font-size: 15px; cursor: pointer; padding: 4px 8px; }

    /* SCREENS */
    .screen { display: none; padding: 0 16px 100px; overflow-y: auto; height: calc(100vh - var(--safe-top) - var(--safe-bot) - 60px); }
    .screen.active { display: block; }

    /* DATE NAV */
    .date-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 0 12px;
    }
    .date-nav button { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--primary); padding: 4px 10px; }
    .date-nav .date-label { font-size: 17px; font-weight: 600; text-align: center; }
    .date-nav .date-sub { font-size: 13px; color: var(--label); text-align: center; }

    /* PROGRESS BAR */
    .progress-wrap { background: var(--card); border-radius: 12px; padding: 14px 16px; margin-bottom: 14px; }
    .progress-top { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .progress-top span:first-child { font-size: 15px; font-weight: 600; }
    .progress-pct { font-size: 15px; font-weight: 700; color: var(--primary); }
    .progress-bar { height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 4px; background: var(--green); transition: width 0.4s cubic-bezier(0.34,1.56,0.64,1); }

    /* SUPPLEMENT CARDS */
    .sup-list { display: flex; flex-direction: column; gap: 1px; }
    .sup-card {
      background: var(--card); display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
      padding: 14px 16px;
    }
    .sup-card:first-child { border-radius: 12px 12px 0 0; }
    .sup-card:last-child { border-radius: 0 0 12px 12px; }
    .sup-card:only-child { border-radius: 12px; }
    .sup-card + .sup-card { border-top: 0.5px solid var(--border); }
    .sup-name { flex: 1; font-size: 17px; min-width: 150px; }
    .sup-name.empty { color: var(--label); font-style: italic; }
    .sup-time { font-size: 13px; color: var(--label); }
    .sup-streak { font-size: 12px; color: var(--green); font-weight: 600; }
    .check-circle {
      width: 32px; height: 32px; border-radius: 50%;
      border: 2px solid var(--border); background: none;
      cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; font-size: 16px;
    }
    .check-circle.done { background: var(--green); border-color: var(--green); }

    /* STATS */
    .month-nav { display: flex; align-items: center; justify-content: space-between; padding: 8px 0 14px; }
    .month-nav button { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--primary); padding: 4px 10px; }
    .month-nav .month-label { font-size: 17px; font-weight: 600; }

    .stat-card {
      background: var(--card); border-radius: 12px; padding: 14px 16px;
      margin-bottom: 10px;
    }
    .stat-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .stat-row:last-child { margin-bottom: 0; }
    .stat-name { flex: 1; font-size: 16px; }
    .stat-count { font-size: 15px; font-weight: 700; color: var(--primary); min-width: 30px; text-align: right; }
    .stat-bar-wrap { flex: 2; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
    .stat-bar-fill { height: 100%; border-radius: 3px; background: var(--primary); transition: width 0.4s; }
    .stat-pct { font-size: 12px; color: var(--label); min-width: 34px; text-align: right; }

    .summary-box {
      background: var(--card); border-radius: 12px; padding: 16px;
      margin-bottom: 10px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; text-align: center;
    }
    .summary-val { font-size: 26px; font-weight: 700; }
    .summary-lbl { font-size: 12px; color: var(--label); margin-top: 2px; }
    .green { color: var(--green); }
    .orange { color: var(--orange); }
    .blue { color: var(--primary); }

    /* CHART */
    .chart-wrap { background: var(--card); border-radius: 12px; padding: 16px; margin-bottom: 10px; }
    .chart-wrap h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
    #trendChart { width: 100%; height: 160px; }
    .heatmap-wrap { background: var(--card); border-radius: 12px; padding: 16px; margin-bottom: 10px; }
    .heatmap-wrap h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
    .heatmap-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .heatmap-day { width: 100%; aspect-ratio: 1; border-radius: 4px; background: var(--bg); }

    /* SETTINGS */
    .section-header {
      font-size: 13px; font-weight: 600; color: var(--label);
      text-transform: uppercase; letter-spacing: 0.5px;
      padding: 16px 0 6px;
    }
    .settings-row {
      background: var(--card); display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; border-top: 0.5px solid var(--border); flex-wrap: wrap;
    }
    .settings-row:first-child { border-top: none; border-radius: 12px 12px 0 0; }
    .settings-row:last-child { border-radius: 0 0 12px 12px; }
    .settings-row:only-child { border-radius: 12px; border-top: none; }
    .sup-num { font-size: 15px; color: var(--label); min-width: 22px; }
    .sup-input {
      flex: 1; border: none; background: transparent; font-size: 17px;
      color: var(--text); font-family: inherit; outline: none; min-width: 100px;
    }
    .sup-input::placeholder { color: var(--label); }
    .time-input {
      width: 70px; padding: 6px 8px; border: 1px solid var(--border); border-radius: 6px;
      background: var(--bg); color: var(--text); font-size: 14px; font-family: monospace;
    }
    .notif-toggle {
      width: 50px; height: 28px; background: var(--green); border: none; border-radius: 14px;
      cursor: pointer; position: relative; transition: background 0.3s; flex-shrink: 0;
    }
    .notif-toggle::after {
      content: ''; position: absolute; width: 24px; height: 24px;
      background: white; border-radius: 12px; top: 2px; left: 2px; transition: left 0.3s;
    }
    .notif-toggle.off { background: var(--border); }
    .notif-toggle.off::after { left: 24px; }

    /* TAB BAR */
    .tabbar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--card); border-top: 0.5px solid var(--border);
      display: flex; padding-bottom: var(--safe-bot); z-index: 50;
    }
    .tab {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 8px 0 4px; background: none; border: none; cursor: pointer;
      color: var(--label); font-size: 10px; gap: 2px;
    }
    .tab svg { width: 24px; height: 24px; }
    .tab.active { color: var(--primary); }

    .empty-stat { text-align: center; color: var(--label); padding: 40px 0; font-size: 15px; }
  </style>
</head>
<body>

<!-- DZISIAJ -->
<div id="screen-today" class="screen active">
  <div class="navbar">
    <h1>💊 Suplementy</h1>
    <button class="nav-btn" onclick="goToday()">Dzisiaj</button>
  </div>
  <div class="date-nav">
    <button onclick="changeDay(-1)">‹</button>
    <div>
      <div class="date-label" id="day-label"></div>
      <div class="date-sub" id="day-sub"></div>
    </div>
    <button onclick="changeDay(1)">›</button>
  </div>
  <div class="progress-wrap">
    <div class="progress-top">
      <span>Postęp dnia</span>
      <span class="progress-pct" id="prog-pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div class="sup-list" id="sup-list"></div>
</div>

<!-- STATYSTYKI -->
<div id="screen-stats" class="screen">
  <div class="navbar"><h1>📊 Statystyki</h1></div>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">‹</button>
    <div class="month-label" id="month-label"></div>
    <button onclick="changeMonth(1)">›</button>
  </div>
  <div class="summary-box" id="stats-summary"></div>
  <div class="chart-wrap">
    <h3>Trend (30 dni)</h3>
    <canvas id="trendChart"></canvas>
  </div>
  <div class="heatmap-wrap">
    <h3>Heatmapa miesiąca</h3>
    <div class="heatmap-grid" id="heatmap"></div>
  </div>
  <div class="section-header">Każdy suplement</div>
  <div id="stats-list"></div>
</div>

<!-- USTAWIENIA -->
<div id="screen-settings" class="screen">
  <div class="navbar"><h1>⚙️ Ustawienia</h1></div>
  <div class="section-header">Powiadomienia</div>
  <div style="background:var(--card);border-radius:12px;overflow:hidden;">
    <div class="settings-row" style="border-top:none;">
      <div style="flex:1;font-size:15px;">Powiadomienia włączone</div>
      <button class="notif-toggle" id="notif-toggle" onclick="toggleNotif()" style=""></button>
    </div>
  </div>
  <div class="section-header">Nazwy i godziny suplementów</div>
  <div id="settings-list"></div>
  <div class="section-header" style="margin-top:8px;"></div>
  <div style="background:var(--card);border-radius:12px;overflow:hidden;">
    <div class="settings-row" style="border-top:none;">
      <div style="flex:1;font-size:15px;color:var(--label)">Wersja 1.0 · dane zapisane lokalnie</div>
    </div>
  </div>
</div>

<!-- TAB BAR -->
<div class="tabbar">
  <button class="tab active" id="tab-today" onclick="showTab('today')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
    </svg>
    Dzisiaj
  </button>
  <button class="tab" id="tab-stats" onclick="showTab('stats')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
    </svg>
    Statystyki
  </button>
  <button class="tab" id="tab-settings" onclick="showTab('settings')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
    Ustawienia
  </button>
</div>

<script>
// ── STATE ──
const DEFAULT_SUPS = [
  'Kreatyna','Omega 3','Sanprobi','Lions Mane','D3',
  'Ginger','Maślan sodu (rano)','Maślan sodu (wieczór)','Magnez','B12'
];

let state = JSON.parse(localStorage.getItem('suptracker') || 'null') || {
  supplements: DEFAULT_SUPS.map((n,i) => ({ id: i, name: n, time: '09:00', enabled: true })),
  logs: {},
  streaks: {},
  notifEnabled: true
};

if (state.supplements && state.supplements[0] && !state.supplements[0].time) {
  state.supplements = state.supplements.map(s => ({ ...s, time: '09:00', enabled: true }));
  state.streaks = {};
  state.notifEnabled = true;
}

function save() {
  localStorage.setItem('suptracker', JSON.stringify(state));
  updateServiceWorker();
}

function updateServiceWorker() {
  if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
    navigator.serviceWorker.controller.postMessage({
      type: 'UPDATE_STATE',
      state: state
    });
  }
}

// ── DATE ──
let currentDate = todayStr();
let currentMonth = new Date().toISOString().slice(0,7);

function todayStr() { return new Date().toISOString().slice(0,10); }

function formatDayLabel(d) {
  const t = todayStr();
  const dt = new Date(d + 'T12:00:00');
  const tom = new Date(); tom.setDate(tom.getDate()+1);
  const yes = new Date(); yes.setDate(yes.getDate()-1);
  if (d === t) return 'Dzisiaj';
  if (d === tom.toISOString().slice(0,10)) return 'Jutro';
  if (d === yes.toISOString().slice(0,10)) return 'Wczoraj';
  return dt.toLocaleDateString('pl-PL', { weekday:'long', day:'numeric', month:'long' });
}

function changeDay(n) {
  const d = new Date(currentDate + 'T12:00:00');
  d.setDate(d.getDate() + n);
  const next = d.toISOString().slice(0,10);
  if (next > todayStr()) return;
  currentDate = next;
  renderToday();
}

function goToday() {
  currentDate = todayStr();
  renderToday();
}

function changeMonth(n) {
  const [y, m] = currentMonth.split('-').map(Number);
  const d = new Date(y, m - 1 + n, 1);
  const next = d.toISOString().slice(0,7);
  if (next > new Date().toISOString().slice(0,7)) return;
  currentMonth = next;
  renderStats();
}

// ── TABS ──
function showTab(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'today') renderToday();
  if (name === 'stats') renderStats();
  if (name === 'settings') renderSettings();
}

// ── STREAK ──
function calculateStreak(supId) {
  let count = 0;
  let current = new Date(todayStr() + 'T12:00:00');
  while (true) {
    const dateStr = current.toISOString().slice(0,10);
    if (!state.logs[dateStr] || !state.logs[dateStr][supId]) break;
    count++;
    current.setDate(current.getDate() - 1);
  }
  return count;
}

function getStreakEmoji(count) {
  if (count >= 20) return '💪';
  if (count >= 10) return '⭐';
  if (count >= 5) return '🔥';
  return '';
}

// ── TODAY ──
function renderToday() {
  document.getElementById('day-label').textContent = formatDayLabel(currentDate);
  document.getElementById('day-sub').textContent = new Date(currentDate + 'T12:00:00')
    .toLocaleDateString('pl-PL', { day:'numeric', month:'long', year:'numeric' });

  const log = state.logs[currentDate] || {};
  const active = state.supplements.filter(s => s.name.trim());
  const done = active.filter(s => log[s.id]).length;
  const pct = active.length ? Math.round(done / active.length * 100) : 0;

  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-fill').style.background = pct === 100 ? 'var(--green)' : pct >= 50 ? 'var(--primary)' : 'var(--orange)';

  const list = document.getElementById('sup-list');
  list.innerHTML = state.supplements.map((s, idx) => {
    const hasName = s.name.trim();
    const checked = log[s.id];
    const streak = calculateStreak(s.id);
    const emoji = getStreakEmoji(streak);
    return `<div class="sup-card">
      <button class="check-circle ${checked ? 'done' : ''}"
        onclick="${hasName ? `toggleSup(${s.id})` : ''}"
        ${!hasName ? 'style="opacity:0.3;cursor:default"' : ''}>
        ${checked ? '✓' : ''}
      </button>
      <div style="flex:1">
        <div class="sup-name ${!hasName ? 'empty' : ''}">${hasName ? esc(s.name) : `Suplement ${idx + 1} (nie ustawiony)`}</div>
        <div style="display:flex;gap:8px;margin-top:4px;">
          <span class="sup-time">${s.time}</span>
          ${emoji ? `<span class="sup-streak">${emoji} ${streak}</span>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleSup(id) {
  if (!state.logs[currentDate]) state.logs[currentDate] = {};
  state.logs[currentDate][id] = !state.logs[currentDate][id];
  save();
  renderToday();
}

// ── STATS ──
function renderStats() {
  const [y, m] = currentMonth.split('-').map(Number);
  const label = new Date(y, m - 1, 1).toLocaleDateString('pl-PL', { month: 'long', year: 'numeric' });
  document.getElementById('month-label').textContent = label.charAt(0).toUpperCase() + label.slice(1);

  const daysInMonth = new Date(y, m, 0).getDate();
  const today = todayStr();

  const monthDays = [];
  for (let d = 1; d <= daysInMonth; d++) {
    const key = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if (key <= today) monthDays.push(key);
  }

  const tracked = monthDays.filter(d => state.logs[d]).length;
  const active = state.supplements.filter(s => s.name.trim());

  let totalChecks = 0;
  monthDays.forEach(d => {
    const log = state.logs[d] || {};
    active.forEach(s => { if (log[s.id]) totalChecks++; });
  });

  const maxPossible = active.length * monthDays.length;
  const overallPct = maxPossible ? Math.round(totalChecks / maxPossible * 100) : 0;

  document.getElementById('stats-summary').innerHTML = `
    <div><div class="summary-val blue">${monthDays.length}</div><div class="summary-lbl">Dni w miesiącu</div></div>
    <div><div class="summary-val green">${tracked}</div><div class="summary-lbl">Dni z wpisem</div></div>
    <div><div class="summary-val orange">${overallPct}%</div><div class="summary-lbl">Ogólnie</div></div>
  `;

  renderTrendChart(monthDays);
  renderHeatmap(y, m, monthDays);

  const statsList = document.getElementById('stats-list');
  if (!active.length || !monthDays.length) {
    statsList.innerHTML = '<div class="empty-stat">Brak danych</div>';
    return;
  }

  const rows = active.map(s => {
    const count = monthDays.filter(d => state.logs[d] && state.logs[d][s.id]).length;
    const pct = monthDays.length ? Math.round(count / monthDays.length * 100) : 0;
    const color = pct >= 80 ? 'var(--green)' : pct >= 50 ? 'var(--primary)' : 'var(--orange)';
    return { s, count, pct, color };
  }).sort((a,b) => b.count - a.count);

  statsList.innerHTML = `<div class="stat-card">${rows.map(r => `
    <div class="stat-row">
      <div class="stat-name">${esc(r.s.name)}</div>
      <div class="stat-count">${r.count}</div>
      <div class="stat-bar-wrap"><div class="stat-bar-fill" style="width:${r.pct}%;background:${r.color}"></div></div>
      <div class="stat-pct">${r.pct}%</div>
    </div>`).join('')}</div>`;
}

function renderTrendChart(monthDays) {
  const canvas = document.getElementById('trendChart');
  const ctx = canvas.getContext('2d');

  canvas.width = canvas.offsetWidth * window.devicePixelRatio;
  canvas.height = canvas.offsetHeight * window.devicePixelRatio;
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  const w = canvas.offsetWidth, h = canvas.offsetHeight;

  const active = state.supplements.filter(s => s.name.trim());
  if (!active.length) return;

  const data = monthDays.map(d => {
    const log = state.logs[d] || {};
    const count = active.filter(s => log[s.id]).length;
    return Math.round(count / active.length * 100);
  });

  const padding = 40;
  const chartW = w - padding * 2;
  const chartH = h - padding * 2;

  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--bg');
  ctx.fillRect(0, 0, w, h);

  ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--border');
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(padding, padding);
  ctx.lineTo(padding, h - padding);
  ctx.lineTo(w - padding, h - padding);
  ctx.stroke();

  ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--primary');
  ctx.lineWidth = 2;
  ctx.beginPath();

  for (let i = 0; i < data.length; i++) {
    const x = padding + (i / (data.length - 1)) * chartW;
    const y = h - padding - (data[i] / 100) * chartH;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();

  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--primary');
  ctx.font = '12px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('0%', padding - 20, h - padding + 5);
  ctx.fillText('100%', padding - 20, padding + 5);
}

function renderHeatmap(y, m, monthDays) {
  const heatmap = document.getElementById('heatmap');
  heatmap.innerHTML = '';

  const active = state.supplements.filter(s => s.name.trim());
  if (!active.length) return;

  const firstDay = new Date(y, m - 1, 1).getDay();

  for (let i = 0; i < firstDay; i++) {
    heatmap.innerHTML += '<div class="heatmap-day" style="opacity:0.1"></div>';
  }

  monthDays.forEach(dateStr => {
    const log = state.logs[dateStr] || {};
    const count = active.filter(s => log[s.id]).length;
    const pct = Math.round(count / active.length * 100);

    let color = getComputedStyle(document.documentElement).getPropertyValue('--border');
    if (pct >= 75) color = getComputedStyle(document.documentElement).getPropertyValue('--green');
    else if (pct >= 50) color = getComputedStyle(document.documentElement).getPropertyValue('--primary');
    else if (pct > 0) color = getComputedStyle(document.documentElement).getPropertyValue('--orange');

    const day = document.createElement('div');
    day.className = 'heatmap-day';
    day.style.background = color.trim();
    day.title = `${dateStr}: ${pct}%`;
    heatmap.appendChild(day);
  });
}

// ── SETTINGS ──
function renderSettings() {
  const notifBtn = document.getElementById('notif-toggle');
  if (state.notifEnabled) notifBtn.classList.remove('off');
  else notifBtn.classList.add('off');

  const list = document.getElementById('settings-list');
  list.innerHTML = `<div style="background:var(--card);border-radius:12px;overflow:hidden;">` +
    state.supplements.map((s, i) => `
      <div class="settings-row">
        <span class="sup-num">${i + 1}.</span>
        <input class="sup-input" type="text" value="${esc(s.name)}"
          placeholder="Suplement ${i + 1}"
          onblur="updateSupName(${s.id}, this.value)"
          onkeydown="if(event.key==='Enter')this.blur()">
        <input class="time-input" type="time" value="${s.time}"
          onchange="updateSupTime(${s.id}, this.value)">
      </div>`).join('') + `</div>`;
}

function updateSupName(id, val) {
  const s = state.supplements.find(x => x.id === id);
  if (s) { s.name = val.trim(); save(); }
}

function updateSupTime(id, val) {
  const s = state.supplements.find(x => x.id === id);
  if (s) { s.time = val; save(); renderSettings(); }
}

function toggleNotif() {
  state.notifEnabled = !state.notifEnabled;
  save();
  renderSettings();
  if (state.notifEnabled && !('Notification' in window)) {
    alert('Powiadomienia nie są wspierane w Twojej przeglądarce');
  } else if (state.notifEnabled && Notification.permission !== 'granted') {
    Notification.requestPermission();
  }
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── SERVICE WORKER ──
if ('serviceWorker' in navigator && 'Notification' in window) {
  navigator.serviceWorker.register('sw.js').then(reg => {
    updateServiceWorker();
  }).catch(() => {});
}

// ── INIT ──
renderToday();
